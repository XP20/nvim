window:
  opacity: 1.0
  startup_mode: Maximized
  padding:
    x: 0
    y: 0
  dynamic_title: false

font:
  size: 17
  normal:
    family: M+1Code Nerd Font Mono
    style: Regular
  bold:
    family: M+1Code Nerd Font Mono
    style: Regular

import:
  # uncomment the flavour you want below:
  - C:/Users/xp2/AppData/Roaming/alacritty/mountain.yml
#  - C:/Users/xp2/AppData/Roaming/alacritty/catppuccin/catppuccin-mocha.yml
#  - C:/Users/xp2/AppData/Roaming/alacritty/catppuccin/catppuccin-macchiato.yml
#  - C:/Users/xp2/AppData/Roaming/alacritty/catppuccin/catppuccin-frappe.yml
#  - C:/Users/xp2/AppData/Roaming/alacritty/catppuccin/catppuccin-latte.yml
env:
  TERM: xterm-256color

shell:
  program: C:\Windows\System32\wsl.exe

key_bindings:
  - { key: Slash, mods: Control, chars: "\x1f" }
